name: Golang CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  golangci-lint:
    name: Lint Code
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=10m
  test:
    name: Test with Code Coverage
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: make build
      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./internal/...
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: coverage.out
      - name: Check code coverage
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: $coverage%"
          if (( $(echo "$coverage < 80" | bc -l) )); then
            echo "Code coverage below threshold!" && exit 1
          fi
  hadolint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
  sonarqube:
    name: Sonarqube Checker
    runs-on: ubuntu-latest
    needs: [golangci-lint, test]
    if: github.event_name != 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Download coverage artifact
      uses: actions/download-artifact@v4
      with:
        name: coverage-out
        path: ./coverage
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@8.1.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      with:
        args: >
          -Dsonar.go.coverage.reportPaths=coverage/coverage.out
  build-image:
    name: Build and Push Docker Image
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Install dependencies
        run: make build
      - name: Build docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile -t ermasavior/nebengjek-${SERVICE_NAME}:${IMAGE_TAG} .
      - name: Push docker image
        env:
          SERVICE_NAME: ${{ github.event.repository.name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push ermasavior/${SERVICE_NAME}:${IMAGE_TAG}
  deploy:
    name: Deploy to EC2
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2 
      - name: Build & Deploy
        env:
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOSTNAME: ${{ secrets.SSH_HOSTNAME }}
          USERNAME: ${{ secrets.SSH_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
      
        run: |
          echo "$PRIVATE_KEY" > private_key && chmod 600 private_key
          ssh -o StrictHostKeyChecking=no -i private_key ${USERNAME}@${HOSTNAME} "
            export IMAGE_TAG=${IMAGE_TAG} &&
            cd ~/apps &&
            docker compose pull search-service &&
            docker compose up -d --no-deps search-service
          "